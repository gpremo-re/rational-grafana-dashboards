apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# kube-prometheus-stack's `grafana-sc-dashboard` sidecar watches the monitoring
# namespace for ConfigMaps with this label and provisions any *.json keys.
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: rrc-site-overview-dashboard
    files:
      - rrc-site-overview.json=dashboards/rrc-site-overview.json
  - name: rrc-pod-details-dashboard
    files:
      - rrc-pod-details.json=dashboards/rrc-pod-details.json
